<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a131e" />
  <meta name="color-scheme" content="dark" />
  <title>Generator ANC · Bench</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="root">
    <div class="boot">Loading bench…</div>
  </div>

  <!-- React + Babel from CDN (no build step) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

  <!-- data first (plain JS → window.ANC) -->
  <script src="data.js"></script>

  <!-- components/screens register on window, app renders last -->
  <script type="text/babel" data-presets="react" src="components.jsx"></script>
  <script type="text/babel" data-presets="react" src="WiringGuide.jsx"></script>
  <script type="text/babel" data-presets="react" src="Dashboard.jsx"></script>
  <script type="text/babel" data-presets="react" src="app.jsx"></script>
</body>
</html>
